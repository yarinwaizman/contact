<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarin Waizman</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0ede6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #faf9f6;
            border-radius: 20px;
            border: 1px solid #e2ddd5;
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }

        .card-header {
            background: #f2ede5;
            padding: 36px 28px 28px;
            text-align: center;
            border-bottom: 1px solid #e2ddd5;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e4ddd0;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: #6b5e4e;
            letter-spacing: 1px;
        }

        .card-header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #2a2018;
            margin-bottom: 4px;
        }

        .card-header p {
            font-size: 13px;
            color: #9a8a75;
        }

        .card-body {
            padding: 24px 24px 28px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #b0a090;
            margin-bottom: 12px;
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }

        .social-btn {
            background: #ffffff;
            border: 1px solid #e0dbd2;
            border-radius: 12px;
            padding: 14px 10px;
            text-align: center;
            text-decoration: none;
            color: #4a3f32;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .social-btn i {
            font-size: 20px;
        }

        .social-btn:hover {
            background: #f5f1eb;
            border-color: #c8bfb2;
            transform: translateY(-1px);
        }

        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-linkedin-in { color: #0077B5; }
        .fa-facebook-f { color: #4267B2; }

        .divider {
            height: 1px;
            background: #e8e3db;
            margin-bottom: 20px;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #ffffff;
            border: 1px solid #e0dbd2;
            border-radius: 10px;
            padding: 12px 14px;
            text-decoration: none;
            color: #4a3f32;
            font-size: 13px;
            transition: background 0.15s, border-color 0.15s;
        }

        .contact-row:hover {
            background: #f5f1eb;
            border-color: #c8bfb2;
        }

        .contact-row i {
            font-size: 15px;
            color: #a0907c;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .contact-row span {
            color: #7a6a58;
            font-size: 11px;
            display: block;
        }

        footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: #c0b09a;
            border-top: 1px solid #e2ddd5;
        }

        @media (max-width: 460px) {
            body {
                padding: 16px;
                align-items: flex-start;
            }
            .card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="avatar">YW</div>
            <h1>Yarin Waizman</h1>
            <p>Feel free to reach out anytime</p>
        </div>

        <div class="card-body">
            <p class="section-label">Connect</p>
            <div class="social-grid">
                <a href="https://wa.me/972543185356" target="_blank" class="social-btn">
                    <i class="fab fa-whatsapp"></i>
                    WhatsApp
                </a>
                <a href="https://instagram.com/yarinwaizman" target="_blank" class="social-btn">
                    <i class="fab fa-instagram"></i>
                    Instagram
                </a>
                <a href="https://www.linkedin.com/in/yarin-waizman-4313b0288" target="_blank" class="social-btn">
                    <i class="fab fa-linkedin-in"></i>
                    LinkedIn
                </a>
                <a href="https://www.facebook.com/YarinWaizman/" target="_blank" class="social-btn">
                    <i class="fab fa-facebook-f"></i>
                    Facebook
                </a>
            </div>

            <div class="divider"></div>

            <p class="section-label">Contact</p>
            <div class="contact-list">
                <a href="tel:+972543185356" class="contact-row">
                    <i class="fas fa-phone"></i>
                    <div>
                        +972 54 318 5356
                        <span>Phone</span>
                    </div>
                </a>
                <a href="mailto:yarinwaizman1996@gmail.com" class="contact-row">
                    <i class="fas fa-envelope"></i>
                    <div>
                        yarinwaizman1996@gmail.com
                        <span>Personal email</span>
                    </div>
                </a>
                <a href="mailto:yarinw@electra.co.il" class="contact-row">
                    <i class="fas fa-briefcase"></i>
                    <div>
                        yarinw@electra.co.il
                        <span>Work email</span>
                    </div>
                </a>
            </div>
        </div>

        <footer>© 2024 Yarin Waizman</footer>
    </div>
</body>
</html>
